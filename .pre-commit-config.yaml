repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff-check
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
        files: ^src/

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []

  # Runs on push only: the commit-stage hooks above are per-file and fast,
  # while this is the whole offline gate (unit + performance + evaluation
  # tiers, plus OpenSpec validation). Catches what unit-only checks miss.
  # Integration and e2e need live services and stay out of the hook.
  - repo: local
    hooks:
      - id: verify
        name: make verify (offline test tiers + OpenSpec validation)
        entry: make verify
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
